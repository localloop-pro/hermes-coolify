version: '3.8'

services:
  hermes:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - hermes_data:/home/hermes/.hermes
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  hermes_data:
    driver: local
