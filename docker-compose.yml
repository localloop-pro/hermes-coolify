services:
  hermes:
    build: .
    restart: unless-stopped
    volumes:
      - hermes_data:/home/hermes/.hermes
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}

volumes:
  hermes_data:
    driver: local
